name: Hourly Feed Scrape and Sync

on:
  schedule:
    - cron: '0 * * * *'  # Runs at the start of every hour
  workflow_dispatch:      # Allows manual trigger via the GitHub UI

jobs:
  sync:
    name: Scrape & Sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # caching pip dependencies for fast builds

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx beautifulsoup4 selectolax google-cloud-firestore firebase-admin

      - name: Run Cron Sync Task
        run: |
          python3 backend/firebase_sync.py cron
